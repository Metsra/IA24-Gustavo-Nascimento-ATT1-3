<!DOCTYPE html>
<html lang='en'>

<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>bibibi</title>
  <link rel="stylesheet" href="main.css">
</head>

<body>
  <pre id="app">
    ... aqui vai aparecer o resultado da API ...
  </pre>

  <button class="bt-buscar">Buscar</button>
  <button class="bt-cadastrar">Cadastrar</button>
  <button class="bt-atualizar">Atualizar</button>
  <button class="bt-patch">Patch</button>
  <button class="bt-deletar">Deletar</button>

<script>
    const container = document.querySelector('#app');
    const btBuscar = document.querySelector('.bt-buscar');
    const btCadastrar = document.querySelector('.bt-cadastrar');
    const btAtualizar = document.querySelector('.bt-atualizar');
    const btPatch = document.querySelector('.bt-patch'); // Pode ser removido do HTML depois
    const btDeletar = document.querySelector('.bt-deletar');

    btBuscar.addEventListener('click', async () => {
      const resposta = await fetch('/items');
      const dados = JSON.stringify(await resposta.json(), null, 2); 
      container.textContent = "Lista de Tarefas:\n" + dados;
    });

    btCadastrar.addEventListener('click', async () => {
      const resposta = await fetch('/items', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: `Nova tarefa ${Date.now()}` }) 
      });
      const dados = JSON.stringify(await resposta.json(), null, 2);
      container.textContent = "Tarefa Adicionada:\n" + dados;
    });

    btAtualizar.addEventListener('click', async () => {
      const resposta = await fetch('/items/0', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ description: `Tarefa atualizada ${Date.now()}` })
      });
      const dados = JSON.stringify(await resposta.json(), null, 2);
      container.textContent = "Tarefa Atualizada:\n" + dados;
    });

    btDeletar.addEventListener('click', async () => {
      const resposta = await fetch('/items/0', { method: 'DELETE' }); 
      
      if (resposta.status === 204) {
        container.textContent = "Primeiro item deletado com sucesso!";
      } else {
        container.textContent = "Erro ao deletar item.";
      }
    });

    btPatch.addEventListener('click', () => {
      container.textContent = "Rota PATCH não existe no backend atual.";
    });
  </script>
</body>

</html>
